<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Gallery</title>
    <style>
        .gallery {
            display: grid; /* Activates CSS Grid */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px; /* Space between grid items */
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Ensures images fill container properly */
            display: block;
        }

        .item-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .item-caption {
            transform: translateY(0);
        }

        /* Different grid layouts for demonstration */
        .featured {
            grid-column: span 2; /* Featured item takes 2 columns */
            grid-row: span 2;    /* Featured item takes 2 rows */
        }

        .featured img {
            height: 400px;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="gallery-item featured">
            <img src="https://picsum.photos/600/400" alt="Featured image">
            <div class="item-caption">Featured Photo</div>
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/300/200" alt="Image 1">
            <div class="item-caption">Nature</div>
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/300/201" alt="Image 2">
            <div class="item-caption">Mountains</div>
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/300/202" alt="Image 3">
            <div class="item-caption">Ocean</div>
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/300/203" alt="Image 4">
            <div class="item-caption">Forest</div>
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/300/204" alt="Image 5">
            <div class="item-caption">City</div>
        </div>
    </div>
</body>
</html>
