<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive DOM Playground</title>
    <style>
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #3498db;
            color: white;
        }

        button:hover {
            background: #2980b9;
        }

        .dynamic-content {
            padding: 20px;
            border: 2px dashed #3498db;
            border-radius: 8px;
            min-height: 200px;
            margin-top: 20px;
        }

        .item {
            background: #ecf0f1;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .counter {
            font-size: 2rem;
            text-align: center;
            margin: 20px 0;
        }

        .color-box {
            width: 100px;
            height: 100px;
            margin: 10px;
            border: 1px solid #333;
            display: inline-block;
        }

        input[type="text"] {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DOM Manipulation Playground</h1>
        
        <div class="controls">
            <div class="control-group">
                <h3>Content Manipulation</h3>
                <button onclick="addItem()">Add List Item</button>
                <button onclick="removeLastItem()">Remove Last Item</button>
                <button onclick="clearAllItems()">Clear All Items</button>
                <div>
                    <input type="text" id="newItemText" placeholder="Enter item text">
                    <button onclick="addCustomItem()">Add Custom Item</button>
                </div>
            </div>

            <div class="control-group">
                <h3>Style Manipulation</h3>
                <button onclick="changeBackground()">Change Background</button>
                <button onclick="toggleBorder()">Toggle Border</button>
                <button onclick="increaseFont()">Increase Font</button>
                <button onclick="decreaseFont()">Decrease Font</button>
            </div>

            <div class="control-group">
                <h3>Counter</h3>
                <div class="counter" id="counter">0</div>
                <button onclick="incrementCounter()">Increment (+1)</button>
                <button onclick="decrementCounter()">Decrement (-1)</button>
                <button onclick="resetCounter()">Reset Counter</button>
            </div>

            <div class="control-group">
                <h3>Color Changer</h3>
                <div class="color-box" id="colorBox"></div>
                <br>
                <button onclick="changeColor('red')">Red</button>
                <button onclick="changeColor('blue')">Blue</button>
                <button onclick="changeColor('green')">Green</button>
                <button onclick="changeColor('random')">Random Color</button>
            </div>
        </div>

        <div class="dynamic-content" id="contentArea">
            <h3>Dynamic Content Area</h3>
            <p>This content will change based on your interactions.</p>
            <div id="itemList"></div>
        </div>
    </div>

    <script>
        // Counter functionality
        let counterValue = 0;
        const counterElement = document.getElementById('counter');
        
        function incrementCounter() {
            counterValue++;
            updateCounterDisplay();
        }
        
        function decrementCounter() {
            counterValue--;
            updateCounterDisplay();
        }
        
        function resetCounter() {
            counterValue = 0;
            updateCounterDisplay();
        }
        
        function updateCounterDisplay() {
            counterElement.textContent = counterValue;
            // Change color based on value
            if (counterValue > 0) {
                counterElement.style.color = 'green';
            } else if (counterValue < 0) {
                counterElement.style.color = 'red';
            } else {
                counterElement.style.color = 'black';
            }
        }

        // List item management
        let itemCount = 0;
        const itemList = document.getElementById('itemList');
        
        function addItem() {
            itemCount++;
            const newItem = document.createElement('div');
            newItem.className = 'item';
            newItem.innerHTML = `
                Item ${itemCount}
                <button onclick="removeThisItem(this)">Remove</button>
            `;
            itemList.appendChild(newItem);
        }
        
        function addCustomItem() {
            const input = document.getElementById('newItemText');
            const text = input.value.trim();
            
            if (text) {
                const newItem = document.createElement('div');
                newItem.className = 'item';
                newItem.innerHTML = `
                    ${text}
                    <button onclick="removeThisItem(this)">Remove</button>
                `;
                itemList.appendChild(newItem);
                input.value = ''; // Clear input
            }
        }
        
        function removeLastItem() {
            if (itemList.lastChild) {
                itemList.removeChild(itemList.lastChild);
                if (itemCount > 0) itemCount--;
            }
        }
        
        function removeThisItem(button) {
            const item = button.parentElement;
            itemList.removeChild(item);
        }
        
        function clearAllItems() {
            itemList.innerHTML = '';
            itemCount = 0;
        }

        // Style manipulation
        const contentArea = document.getElementById('contentArea');
        let fontSize = 16;
        let borderVisible = true;
        
        function changeBackground() {
            const colors = ['#f8f9fa', '#e9ecef', '#dee2e6', '#ced4da'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            contentArea.style.backgroundColor = randomColor;
        }
        
        function toggleBorder() {
            borderVisible = !borderVisible;
            contentArea.style.borderStyle = borderVisible ? 'dashed' : 'none';
        }
        
        function increaseFont() {
            fontSize += 2;
            contentArea.style.fontSize = fontSize + 'px';
        }
        
        function decreaseFont() {
            fontSize = Math.max(10, fontSize - 2);
            contentArea.style.fontSize = fontSize + 'px';
        }

        // Color box functionality
        const colorBox = document.getElementById('colorBox');
        
        function changeColor(color) {
            if (color === 'random') {
                const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
                colorBox.style.backgroundColor = randomColor;
            } else {
                colorBox.style.backgroundColor = color;
            }
        }

        // Initialize
        updateCounterDisplay();
        changeColor('lightgray');
    </script>
</body>
</html>
